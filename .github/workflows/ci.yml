name: cruise-analytics-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic data
        run: python scripts/generate_synthetic_cruise_data.py

      - name: Validate generated data
        run: python scripts/validate_generated_data.py

      - name: dbt dependencies
        working-directory: dbt_cruise_analytics
        run: |
          cp profiles.example.yml profiles.yml
          dbt deps --profiles-dir .

      - name: dbt debug
        working-directory: dbt_cruise_analytics
        run: dbt debug --profiles-dir .

      - name: dbt build and docs
        working-directory: dbt_cruise_analytics
        run: |
          dbt build --profiles-dir .
          dbt docs generate --profiles-dir .

      - name: Export BI extracts
        run: python scripts/export_bi_extracts.py

      - name: Generate dashboard screenshots
        run: python scripts/generate_dashboard_screenshots.py

      - name: Streamlit import check
        run: python -m py_compile streamlit_app/app.py
